<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde047;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#facc15;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg3)"/>
  <g transform="translate(200,190)">
    <!-- Card shape -->
    <rect x="-110" y="-70" width="220" height="140" rx="16" fill="#1a1a2e"/>
    <!-- Card shine -->
    <rect x="-110" y="-70" width="220" height="40" rx="16" fill="#2a2a4e" opacity="0.5"/>
    <!-- Mastercard circles -->
    <circle cx="-25" cy="0" r="40" fill="#EB001B" opacity="0.9"/>
    <circle cx="25" cy="0" r="40" fill="#F79E1B" opacity="0.9"/>
    <!-- Overlap area -->
    <path d="M0,-35 A40,40 0 0,1 0,35 A40,40 0 0,1 0,-35" fill="#FF5F00" opacity="0.9"/>
    <!-- Chip -->
    <rect x="-85" y="-30" width="35" height="28" rx="4" fill="#C9B037"/>
    <line x1="-85" y1="-16" x2="-50" y2="-16" stroke="#A08C2A" stroke-width="1"/>
    <line x1="-67" y1="-30" x2="-67" y2="-2" stroke="#A08C2A" stroke-width="1"/>
    <!-- 50% text -->
    <text x="0" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="36" fill="#1a1a2e">50% OFF</text>
  </g>
</svg>
