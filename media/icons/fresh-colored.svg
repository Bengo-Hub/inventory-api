<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg4)"/>
  <g transform="translate(200,200)">
    <!-- Shopping bag -->
    <rect x="-70" y="-30" width="140" height="120" rx="10" fill="#F3F4F6"/>
    <rect x="-70" y="-30" width="140" height="20" rx="10" fill="#E5E7EB"/>
    <!-- Bag handles -->
    <path d="M-30,-30 Q-30,-65 0,-65 Q30,-65 30,-30" fill="none" stroke="#9CA3AF" stroke-width="6" stroke-linecap="round"/>
    <!-- Vegetables sticking out -->
    <!-- Carrot -->
    <polygon points="-35,-45 -25,-45 -30,-90" fill="#F97316"/>
    <line x1="-32" y1="-88" x2="-28" y2="-100" stroke="#22C55E" stroke-width="3" stroke-linecap="round"/>
    <line x1="-30" y1="-88" x2="-30" y2="-102" stroke="#16A34A" stroke-width="3" stroke-linecap="round"/>
    <line x1="-28" y1="-88" x2="-32" y2="-100" stroke="#22C55E" stroke-width="2" stroke-linecap="round"/>
    <!-- Broccoli -->
    <circle cx="10" cy="-55" r="16" fill="#22C55E"/>
    <circle cx="0" cy="-60" r="12" fill="#16A34A"/>
    <circle cx="20" cy="-58" r="13" fill="#15803D"/>
    <rect x="8" y="-45" width="5" height="15" rx="2" fill="#65A30D"/>
    <!-- Apple -->
    <circle cx="40" cy="-50" r="18" fill="#EF4444"/>
    <circle cx="36" cy="-55" r="5" fill="#FCA5A5" opacity="0.4"/>
    <rect x="39" y="-70" width="3" height="10" rx="1" fill="#78350F"/>
    <ellipse cx="46" cy="-68" rx="6" ry="4" fill="#22C55E" transform="rotate(30,46,-68)"/>
    <!-- Leaf decoration -->
    <ellipse cx="-55" cy="-40" rx="15" ry="8" fill="#86EFAC" transform="rotate(-20,-55,-40)" opacity="0.7"/>
  </g>
</svg>
